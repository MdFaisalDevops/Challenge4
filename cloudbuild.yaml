steps:
  # 1. Build the Backend Server Container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/server:$COMMIT_SHA'
      - '-f'
      - 'apps/server/Dockerfile'
      - '.'
    id: 'build-server'

  # 2. Build the Next.js Frontend Container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/web:$COMMIT_SHA'
      - '-f'
      - 'apps/web/Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_API_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$_GOOGLE_MAPS_KEY'
      - '.'
    id: 'build-web'

  # 3. Push Backend Image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/server:$COMMIT_SHA']
    id: 'push-server'

  # 4. Push Frontend Image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/web:$COMMIT_SHA']
    id: 'push-web'

  # 5. Deploy Backend to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'crowdmind-server'
      - '--image=$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/server:$COMMIT_SHA'
      - '--region=$_GCP_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production'
      # Mount secrets securely from Secret Manager
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
    id: 'deploy-server'

  # 6. Deploy Frontend to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'crowdmind-web'
      - '--image=$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/web:$COMMIT_SHA'
      - '--region=$_GCP_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production'
    id: 'deploy-web'

images:
  - '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/server:$COMMIT_SHA'
  - '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/web:$COMMIT_SHA'

substitutions:
  _AR_LOCATION: 'us-central1'
  _AR_REPOSITORY: 'crowdmind-repo'
  _GCP_REGION: 'us-central1'
  _API_URL: 'https://crowdmind-server-hash-uc.a.run.app'
  _GOOGLE_MAPS_KEY: 'AIzaSyPlaceholderKeyForBuildTime'

options:
  logging: CLOUD_LOGGING_ONLY
